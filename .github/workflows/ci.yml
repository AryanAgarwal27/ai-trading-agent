name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same ref when new commits land.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: ruff + mypy + pytest unit
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        # BRD §4: Python 3.12 recommended; 3.11 and 3.13 also OK. Test all three.
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip (need >=25.1 for PEP 735 --group support)
        run: python -m pip install --upgrade "pip>=25.1"

      - name: Install runtime deps + project (editable)
        run: pip install -e .

      - name: Install dev deps (PEP 735 dependency group)
        run: pip install --group dev

      - name: ruff (lint)
        run: ruff check .

      - name: ruff (format check)
        run: ruff format --check .

      - name: mypy (strict, orchestrator + tests)
        run: mypy orchestrator tests

      - name: pytest unit (exclude integration)
        run: pytest -m "not integration" tests/unit
