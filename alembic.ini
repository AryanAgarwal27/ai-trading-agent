# Alembic config for the `app` logical DB (BRD §5.8 #3).
# Connection URL is read from the DATABASE_URL env var in db/migrations/env.py,
# so .env / Stage 0 conventions are honoured and no secrets live in this file.

[alembic]
script_location = db/migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

# We don't auto-generate migrations from models — schema lives in BRD §5.8 and
# is hand-written in versions/. Disable autogen-style features that rely on
# metadata reflection.

[post_write_hooks]
# none

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
